# COSTS
# =============================================================================
costs:

  # ---------------------------------------------------------------------------
  # BROKERAGE — corretagem PF retail
  # ---------------------------------------------------------------------------
  # Decisão do squad: adotar default conservador R$ 0.00/contrato/lado assumindo
  # corretora zero-fee retail padrão (Clear/Rico-com-RLP/BTG-daytrade-module/
  # Nu Invest/Toro). Documentado range caso squad mude para corretora com fee.
  brokerage:
    currency: BRL
    per_contract_one_way: 0.00
    per_contract_round_trip: 0.00
    tag: "[WEB-CONFIRMED 2026-04-22]"
    observed_range_brl_one_way:
      min: 0.00       # Clear / Rico+RLP / XP+RLP / BTG day-trade module / Nu Invest
      max: 1.00       # XP sem RLP (+ taxa operacional 5.9% sobre brokerage+emol+liq)
    rationale: |
      Squad opera via corretora retail com RLP/day-trade module. 5 fontes confirmam
      zero corretagem em minicontratos WDO para day trade via plataforma eletrônica:
      Clear, Rico (RLP ativo), XP (RLP aderido), BTG (Day Trade module), Nu Invest.
      Sem RLP/fora-do-módulo: range R$ 0.45-1.00/contrato. Se squad migrar para
      corretora com fee, atualizar em atlas v1.1.0.
    sources_ids:
      - CLEAR-CORRETAGEM-ZERO
      - RICO-CORRETAGEM
      - XP-CORRETAGEM
      - BTG-DAYTRADE-ZERO
      - NUINVEST-ZERO-IMPLIED
    notes: |
      Atenção operacional: RLP (Retail Liquidity Provider) tradeType=13 é condição
      para zero fee em Rico/XP — implica que uma fração dos nossos trades será
      cruzada sinteticamente sem passar pelo book público. Ver Nova RLP_GUIDE para
      implicações de price discovery. Em live-mode, monitorar fração RLP via
      tradeType=13 do TNewTradeCallback.

  # ---------------------------------------------------------------------------
  # EXCHANGE FEES — emolumentos B3 + taxa de registro + taxa de liquidação
  # ---------------------------------------------------------------------------
  exchange_fees:
    currency: BRL
    per_contract_one_way: 1.23             # sum(emolumentos + registro) day trade
    per_contract_round_trip: 2.46
    tag: "[WEB-CONFIRMED 2026-04-22]"
    breakdown:
      emolumentos_brl: 0.43
      registro_brl: 0.80
      liquidacao_brl: 0.00                 # [TO-VERIFY 2026-04-22] — B3 tarifa US$0.12 aparece em tabela de dólar mas componentização BRL para day-trade WDO não é publicamente detalhada; fontes retail listam só (emolumentos + registro). Assume incluída no total ou zero para day trade.
    regime: "day_trade"                    # valores day-trade; swing seria ~1.6x maior (sem incentivo)
    effective_from_brt: "2024-12-10"
    notes: |
      Triangulação cruzada: CM Capital documenta R$ 0.43 emolumentos + R$ 0.80 registro
      por contrato day trade WDO em 2024-12-10. Fórum MQL5 reporta total ~R$ 0.96-1.27.
      Nord Investimentos + modalmais mencionam ~R$ 1.20/contrato como referência geral.
      Valores B3 variam conforme ADV (Average Daily Volume) do participante com
      descontos escalonados — aqui usamos valor base sem desconto (conservador).
      PIS/COFINS (9.25%) e ISS (2-5%) já embutidos no valor cobrado.
      Swing trade (sem incentivo day-trade): ~1.6x maior — fora do escopo desta tese.
    sources_ids:
      - B3-OFFICIAL-TARIFAS-USD
      - B3-PDF-TARIFACAO
      - CMCAPITAL-WDO-CUSTOS
      - MQL5-FORUM-WDO-CUSTOS

  # ---------------------------------------------------------------------------
  # TAX DAY-TRADE — IR pessoa física regime day-trade
  # ---------------------------------------------------------------------------
  tax_day_trade:
    currency: BRL                          # unidade do ganho tributado
    regime: "pessoa_fisica_day_trade_futuros"
    ir_rate: 0.20                          # 20% sobre lucro líquido
    irrf_daily_rate: 0.01                  # 1% retido na fonte ("dedo-duro")
    tag: "[WEB-CONFIRMED 2026-04-22]"
    legal_basis: "Instrução Normativa RFB nº 1.585/2015 (e atualizações)"
    treatment_choice: "post_hoc_on_monthly_net_gain"
    treatment_rationale: |
      TRÊS opções de tratamento avaliadas:
      (a) trade-a-trade: IMPOSSÍVEL — regime tributário PF brasileiro compensa perdas
          intraday/intermês antes de apurar base de cálculo; aplicar trade-a-trade
          superestima IR e não reproduz o fluxo real.
      (b) diário sobre saldo líquido: REALISTA mas exige modelagem de compensação
          cross-day (perdas de D carregam para D+N no mesmo mês) — implementação
          custosa em CPCV; pouco valor marginal para GO/NO-GO da tese T002.
      (c) post-hoc sobre agregado mensal de ganho líquido: APROXIMAÇÃO escolhida.
          Aplicar 20% sobre ganho líquido mensal agregado (compensa perdas intraday
          e intermês no mesmo mês calendário), +1% IRRF retido na fonte sobre
          ganhos diários positivos. Subestima ligeiramente vs (b) em cenários de
          carry de perda entre meses, mas mantém order-of-magnitude correto para
          decisão GO/NO-GO.
      Decisão Nova: adotar (c) em CPCV de T002 Fase E. Re-avaliar para produção
      ao vivo quando Riven modelar cash-flow realista.
    applies_to: "lucro líquido mensal do regime day-trade (compensa perdas intraday/intermês no mês calendário)"
    compensation_rule: "perdas day-trade compensam ganhos day-trade futuros (mesmo mês ou subsequentes, dentro do regime day-trade PF); NÃO compensam com renda comum ou swing-trade."
    darf_code: 8468                        # day trade em bolsas de mercadorias/futuros
    darf_schedule: "até último dia útil do mês subsequente ao da apuração"
    sources_ids:
      - RFB-IN-1585-LEGISWEB
      - PORTALTRIBUTARIO-ALIQUOTAS
      - NUINVEST-TRIBUTACAO
    notes: |
      IR day-trade PF NÃO tem isenção de R$ 20k (isenção é apenas para ações em
      operações comuns, não day-trade nem futuros). IRRF 1% é retido pela corretora
      diretamente sobre resultado positivo do dia — compensável com IR 20% devido no
      mês. Em CPCV, aplicar post-hoc: calcular ganho líquido mensal agregado × 0.20;
      IRRF 1% pode ser ignorado em backtest (é compensável, não custo terminal).

