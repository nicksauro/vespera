      expected: 10.00
      assert_matches_module_constant: "packages.t002_eod_unwind.adapters.exec_backtest.WDO_MULTIPLIER"
    contract_size_usd:
      from: "product.contract_size_usd"        # 10000 [WEB-CONFIRMED 2026-04-22]
      expected: 10000

