# =============================================================================
# CONSUMER CONTRACT — como BacktestCosts.from_engine_config() resolve
# =============================================================================
consumer_contract:
  loader_function: "BacktestCosts.from_engine_config(path: pathlib.Path)"
  expected_steps:
    - "1. Carrega engine-config.yaml via yaml.safe_load"
    - "2. Resolve cost_atlas_ref.path; lê atlas bytes do disco"
    - "3. Normaliza CRLF→LF, computa SHA256, compara com cost_atlas_ref.atlas_sha256_lock"
    - "4. Se mismatch → CostAtlasShaMismatch (fail_fast)"
    - "5. Carrega atlas via yaml.safe_load; valida atlas.atlas_version == cost_atlas_ref.atlas_version_lock"
    - "6. Se mismatch → CostAtlasVersionMismatch (fail_fast)"
    - "7. Resolve cost_components.brokerage.from → atlas.costs.brokerage.per_contract_one_way → 0.00"
    - "8. Resolve cost_components.exchange_fees.from → atlas.costs.exchange_fees.per_contract_one_way → 1.23"
    - "9. Lê slippage_model.roll_spread_half_points e slippage_extra_ticks deste config"
    - "10. Retorna BacktestCosts(brokerage_per_contract_side_rs=0.00, exchange_fees_per_contract_side_rs=1.23, roll_spread_half_points=0.5, slippage_extra_ticks=1)"
  back_compat:
    note: "Constructor BacktestCosts(...) com defaults legacy permanece para back-compat de testes existentes; marcado [DEPRECATED — use from_engine_config]"
    deprecated_path: "BacktestCosts.__init__ direct call with default placeholders R$ 0.25/0.35"

