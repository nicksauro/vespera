# =============================================================================
# CONSUMER CONTRACT — como BacktestCosts.from_engine_config() resolve
# =============================================================================
consumer_contract:
  loader_function: "BacktestCosts.from_engine_config(path: pathlib.Path)"
  expected_steps:
    - "1. Carrega engine-config.yaml via yaml.safe_load"
    - "2. Resolve cost_atlas_ref.path; lê atlas bytes do disco"
    - "3. Normaliza CRLF→LF, computa SHA256, compara com cost_atlas_ref.atlas_sha256_lock"
    - "4. Se mismatch → CostAtlasShaMismatch (fail_fast)"
    - "5. Carrega atlas via yaml.safe_load; valida atlas.atlas_version == cost_atlas_ref.atlas_version_lock"
    - "6. Se mismatch → CostAtlasVersionMismatch (fail_fast)"
    - "7. Resolve cost_components.brokerage.from → atlas.costs.brokerage.per_contract_one_way → 0.00"
    - "8. Resolve cost_components.exchange_fees.from → atlas.costs.exchange_fees.per_contract_one_way → 1.23"
    - "9. Lê slippage_model.roll_spread_half_points e slippage_extra_ticks deste config"
    - "10. Retorna BacktestCosts(brokerage_per_contract_side_rs=0.00, exchange_fees_per_contract_side_rs=1.23, roll_spread_half_points=0.5, slippage_extra_ticks=1)"
  back_compat:
    note: "Constructor BacktestCosts(...) com defaults legacy permanece para back-compat de testes existentes; marcado [DEPRECATED — use from_engine_config]"
    deprecated_path: "BacktestCosts.__init__ direct call with default placeholders R$ 0.25/0.35"

# =============================================================================
# LATENCY MODEL — DMA2 baseline for Phase F real-tape replay
# =============================================================================
# Beckett authority. Spec: docs/backtest/latency-dma2-profile-spec.md §4 verbatim.
# Story:           docs/stories/T002.6.story.md AC3 + R-4 mitigation.
# Synthetic walk N6 and earlier: latency_model NOT applied (events instantaneous).
# Phase F real-tape:               latency_model REQUIRED for honest slippage.
# Mira spec §5.1:                  consumed verbatim into Gate 4b spec body.
latency_model:
  type: "lognormal_per_event_seeded"
  enabled_for_phase: ["F"]              # Phase F only; synthetic walk skipped
  seed_source: ["session", "order_id", "trial_id"]
  hash_function: "blake2b_64"           # deterministic, cross-platform stable
  components:
    order_submit:
      p50_ms: 2.0
      p95_ms: 8.0
      p99_ms_nominal_target: 20.0       # cushion target; not log-normal fit
      distribution: "lognormal"
      mu: 0.6931                        # ln(2)
      sigma: 0.8428                     # ln(8/2) / 1.6449
      implied_p99_ms: 14.21              # transparency — implied < target
    fill:
      p50_ms: 1.0
      p95_ms: 4.0
      p99_ms_nominal_target: 15.0
      distribution: "lognormal"
      mu: 0.0000                        # ln(1)
      sigma: 0.8428                     # ln(4/1) / 1.6449
      implied_p99_ms: 7.10
    cancel:
      p50_ms: 2.0
      p95_ms: 10.0
      p99_ms_nominal_target: 50.0       # heaviest tail — congestion / auction
      distribution: "lognormal"
      mu: 0.6931                        # ln(2)
      sigma: 0.9784                     # ln(10/2) / 1.6449
      implied_p99_ms: 19.48              # log-normal underestimates real tail
  slippage_integration:
    apply_to: ["entry_fill", "barrier_exit_fill"]
    formula: "sign × (mid_at_decision − mid_at_fill_after_latency)"
    units: "points"
    composition_with_existing_slippage: "additive_with_roll_and_extra_ticks"
  to_verify:
    - tag: "[TO-VERIFY 2026-04-29]"
      field: "components.cancel.p99_ms_nominal_target"
      reason: "Heavy-tail cancel under congestion may exceed 50ms; refine via Tiago live calibration post-Phase H."
    - tag: "[TO-VERIFY 2026-04-29]"
      field: "components.*.implied_p99_ms"
      reason: "Log-normal calibrated to (P50, P95) pair underestimates nominal P99 cushion targets."
  rationale: |
    DMA2 baseline para WDO B3 broker-routed flow. Industry-baseline conservative
    calibration. Refinement via Tiago @execution-trader live logs post-Phase H
    per Beckett persona *tiago-calibrate command. Heavy-tail components (cancel
    under congestion) flagged as [TO-VERIFY] for distribution-family refinement.

# =============================================================================
# MICROSTRUCTURE FLAGS — Nova RLP/rollover/auction/CB/cross_trade for Phase F
# =============================================================================
# Nova authority. Spec: docs/backtest/T002.6-nova-rlp-rollover-spec.md §6 verbatim.
# Mira spec §4.1:                  consumed verbatim into Gate 4b spec body.
# Per Aria T0b C-A4: per-session flags propagate through events_dataframe BEFORE
# engine partition; per Aria C-A5 cross_trade default False in historic regime.
microstructure_flags:
  rlp_policy:
    active_hours_brt:
      start: "09:00"
      end:   "17:55"
    detection_signal:
      live_field:   "trade_type"          # Nelo TNewTradeCallback enum, value=13
      historic_field: null                # NOT identifiable in our parquet (BUY/SELL/NONE only)
    fill_treatment: "B"                   # Option B per Nova §1.4 — uniform latency_dma2_profile slippage
    fill_treatment_rationale_ref: "docs/backtest/T002.6-nova-rlp-rollover-spec.md#§1.4"
  rollover:
    flag_d_minus_3_to_d_minus_1: true     # per-session row carries rollover_window: bool
    calendar_path: "config/calendar/2024-2027.yaml"
    derivation: "walk back 3 trading days from each wdo_expirations[i], skipping br_holidays"
    treatment: "Option B"                 # preserve sample, flag for attribution
    carry_forward_bug_guard: true         # Dex T1 MUST resolve explicit contract code per session
  auction:
    exclude_open_close_minutes: 5         # last 5 minutes (17:55-18:00) excluded from continuous-price extraction
    exit_price_rule: "last trade_type in {1,2,3,13} with timestamp < 17:55:00 BRT"
    open_auction_treatment: "no impact on T002.6 entry windows (entries are late-day)"
  circuit_breaker:
    flag_per_session: true                # session feature: circuit_breaker_fired: bool
    detection_signal_historic: "continuous aggressor=NONE gap >30min during 09:30-17:55"
    attribution_path: "Riven 3-bucket — inconclusive | strategy_edge case-by-case"
  cross_trade:
    flag_per_event: true                  # event feature: cross_trade: bool (live only; historic gap documented)
    flag_available_historic: false        # explicit gap; determinism stamp records
    cvd_treatment: "exclude tradeType=1 from CVD / OFI / imbalance"

