contract_multiplier_lookup_field: "Parte 1 — WDO > multiplier"
contract_multiplier_as_of_spec: "R$10/ponto em 2026-04-21 [WEB-CONFIRMED, apenas para debug/reprodutibilidade; NÃO usar em cálculo]"

