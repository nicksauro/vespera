    - PBO
  secondary:
    - sharpe_distribution_45paths
    - sortino
    - MAR
    - max_drawdown
    - hit_rate
    - profit_factor
    - ulcer_index
    - bootstrap_ci_ic_10k  # bootstrap 10k para CI do IC (Mira)

# ----------------------------------------------------
# STRESS-REGIME BREAKDOWN (Fase E obrigatório)
